<svg width="100%" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgHeader" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#16324F"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="220" fill="url(#bgHeader)"/>

  <path fill="#0D1117" opacity="0.55">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
        M0,180 C250,215 750,145 1000,180 L1000,220 L0,220 Z;
        M0,195 C250,150 750,215 1000,170 L1000,220 L0,220 Z;
        M0,180 C250,215 750,145 1000,180 L1000,220 L0,220 Z" />
  </path>

  <text x="500" y="100" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace"
        font-size="56" font-weight="700" fill="#E8EEF4" opacity="0">
    Diego Rodríguez
    <animate attributeName="opacity" from="0" to="1" dur="1.3s" begin="0.2s" fill="freeze"/>
  </text>

  <text x="500" y="142" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace"
        font-size="21" fill="#9FB8CC" opacity="0">
    Full Stack Developer · Java &amp; React
    <animate attributeName="opacity" from="0" to="1" dur="1.3s" begin="0.7s" fill="freeze"/>
  </text>
</svg>
